front:
  text: 金剛經闡說序余觀註此經者類皆高談元妙騁其辭鋒不顧經文之上下前後往往自相矛盾甚至求深愈晦欲望其受持讀誦為人解說尠矣余當此困心橫慮時竊假得數部紬繹之擇其說之顯而明者錄之於經之段落意旨所在竊不揣其固陋而參以鄙見總以經中橫說竪說丁甯反覆無非以明心見性為不二門要著不事藻詞人人可以解說庶有少益乎或云佛欲以明心見性示人則直說法就是了何以經中隨說隨掃似又欲人向元微尋去矣余曰不不此乃見佛之慈悲處何以故人之心性本明因溺於四相六塵以失其本來之明佛不得已假之言說若人能復其本來之明則一切言說譬喻已屬添設若不掃去是顯然以佛法自居佛所不願也蓋欲人即說處思復即掃處思恍然悟本來之自性佛乃不得已而說也此正如來護念付囑之深意耳嘉慶二十一年秋七月上浣古閩白雲山人存吾氏手題於姑蘇會垣之淨信堂捐刊金剛經闡說序葢聞佛道宏深以慈悲而利物神功廣大以智慧而覺人故先天地而不見其始後天地而不見其終觀於金剛般若波羅蜜經葢可見矣是經也論不空之空證無相之相闡明虗妄即六如而可知推測根源於四相而可悟誠諸佛傳燈之奧旨大乘闡道之統宗而羣生明心見性之心法也雖然法由心得非經無以寓夫法經因人明非言無以著夫經世以經傳非梓無以公夫世考自唐宋以至元明釋是經鋟是經者分門別戶汗牛充棟而求其剖真言之至當衷秘旨之弗違唯白雲山人之金剛經闡說為甚詳矣夫白雲山人者古閩鄉進士存吾陳先生也先生諱玉篇公身膺花縣治試絃歌職歷黃堂春分桃李公餘之暇仰慕真如闡說此經通明法相使讀之者如仰寶鏡於中天誦之者若得明珠於滄海惜乎因心種果棃棗未登幸也以福為田子孫永守無奈一字一編必藉檀那之力寸楮寸版無非長者之金於是冀樂善之有同心望樂施而無吝色或慨捐白鏹固屬落落大方或勉助青蚨亦願多多益善伏祈共鑒葵心少伸蓮舌俾夫鏤成卷軸用廣如來之慈悲刷送流傳大啟眾生之智慧是為序同治六年歲次丁卯梅夏臺陽洪壽椿敬撰於海東尋樂山房之西軒凡例是經所註故實悉照鄧葵園太守輯註抄錄依原本不繫註者姓名其餘採某氏說者則繫之非敢掠美也是經自來分為三十二分各有標題偽托傳為梁昭明太子所定似屬淺陋當是後人亦有分作數章者究亦不見得了當今只逐段直解說去讀者自可領悟歸宿也是經諸本多有不同處如何以故及是名云云等或有或無皆於文義無礙今仍依舊本是經於緊要處用一圈尤關要處加雙圈大段屆限處用一截庶讀者醒眼耳
