body:
  text: 古閩白雲山人存吾氏闡說冢孫滋甫厚基陳氏校刊金者鐵也剛生金中百鍊不消最堅利能斷壞萬物譬如智慧能斷絶貪嗔癡一切顛倒之見般若華言智慧波羅蜜華言到彼岸華嚴說六波羅蜜一檀波羅蜜即布施二尸波羅蜜即持戒三羼提波羅蜜即忍辱四毗梨耶波蜜即精進五禪波羅蜜即禪定六般若波羅蜜即智慧六者又名六度經者梵語修多羅姚秦三藏法師鳩摩羅什譯姚秦東晉孝武時小國也先是符堅秦王其子丕稱帝為符秦太元十一年後秦王姚萇稱帝十九年萇卒太子興即位是為姚秦三藏法師謂通大小乘經律論三藏法為大衆師也梵語鳩摩羅什婆華言童壽謂童子而有耆德本天竺人西域龜茲王之甥也七歲出家日誦千偈即明其旨秦主姚興延入逍遙園翻譯諸經其教入中國經皆梵書得歷代西僧通華言者譯梵書為漢字便中國人諷誦此經乃鳩摩羅什所翻譯也如是我聞一時佛在舍衛國至洗足已敷座而坐梵語佛陀華言覺者說此經者為釋迦牟尼佛梵語釋迦牟尼華言能仁寂默姓剎利氏父淨飯王母摩耶於周昭王二十四年甲寅四月初八日自摩耶右脅誕生年十九出家年三十成道涅槃於周穆王五十二年壬申二月十五日滅後一千一十七年教至中夏即後漢永平十年戊辰歲也如是統全經而言我者佛幼弟阿難自稱也梵語阿難華言慶喜淨飯王幼子或云其姪於佛成道日生舉國慶喜故名年二十出家又十年佛命為侍者佛涅槃時阿難請問一切經旨當置何語佛言當置如是我聞一時佛在某處同某人使天下後世知法有本源非世人所可妄說也舍衛國是中天竺波斯匿王之國王太子名祇陀樹是祇陀所施故名祇樹給孤獨園者王之宰臣名須達拏常在此國賑濟孤獨貧人人稱為給孤獨長者涅槃經云須達長者本舍衛人初未知佛為聘婦故入王舍衛城因珊壇那見佛生信請歸舍衛佛令身子選衆居處得祇陀園長者問價太子戲答金布地滿即當賣與長者布金太子感嘆遂與易地地所有樹并以施佛因立精舍長者太子交相發心故稱祇樹給孤獨園比丘華言乞士乞食資身乞法資心大比丘者以通大乘言也佛為三界之尊故稱世尊乞食者佛是金輪王子而自持鉢乞食為欲教化衆生捨離憍慢也時長老須菩提至云何應住云何降伏其心長者有齒德之稱也須菩提華言善現一言善言一云空生其生之日室家皆空父母驚異相師占云既善且吉因名焉為佛大弟子之一長水經疏袒肉袒也西方俗儀見王者必肉袒示非敢有犯佛教亦隨用者然此以表將荷大德之重擔耳肩偏袒膝著地手合掌皆彼國禮也敬為入道之門凡事皆當敬況欲領聞聖教乎如來者佛號也謂之如者以其明則照無量世界而無所蔽慧則通無量劫事而無所礙能變現為一切衆生而無所不可是誠自如者也謂之來者以真性隨所而來現若人至誠禱告則有感應若欲為一切衆生設化則現色身皆其來者也如者真性之本體來者真性之應用也護念付囑謂如來起慈悲心衛護眷念俾信受是法付委囑託俾奉行是法須菩提於大衆聽法之初未遑他恤惟願如來起慈悲心為之護念付囑也菩薩修道者之通稱梵語菩提薩埵省文也菩提華言覺道薩埵華言大心衆生以大心入佛道故名菩薩諸菩薩乃指大衆言之也阿訓無耨多羅訓上三訓正藐訓等菩提訓覺言無上正等正覺廣大包含無以復加故曰無上靈蠢同具高下平等故曰正等萬理全備圓明普照故曰正覺云何應住謂當住於何慮也云何降伏其心謂當如何降伏此妄思心也僧若訥曰須菩提正發此二問一問衆生發無上心欲求般若云何以安住諦理二問降伏惑心云何以折攝散亂一經所說不出此住降而已佛言善哉善哉須菩提至唯然世尊願樂欲聞善哉者嘆其問之切也諦審也如是者指下文所言也唯應之速也然是其言也願樂欲聞者須菩提喜之甚而不覺其詞之復也佛告須菩提菩薩摩訶薩至壽者相即非菩薩此段說降心先言降而後言住者猶言先去私而後存理也然說降而住即在其中摩訶華言大也卵生為魚鳥龜蛇一類胎生為人畜龍仙一類濕生為含蠢蠕動一類化生為轉蛻飛行一類有色為休咎精明一類無色為空散銷沉一類有想為鬼神精靈一類無想為精神化為土木金石一類非有想非無想是概指楞嚴經所云諸天人不了妙覺明心妄隨七趣沉溺補特伽羅者而言涅槃華言圓寂無餘涅槃即楞嚴所謂大涅槃一切修行者之所依歸僧宗密疏鈔云不生為涅不滅為槃是圓滿清淨能所全消超脫輪回出離生死即究竟到彼岸地位誤認為死則大謬矣涅槃有四一自性涅槃凡聖共有二無住涅槃諸佛應化三有餘涅槃小果只斷三界見思未脫無明四無餘涅槃已脫盡故曰無餘也滅者滅盡愚癡煩惱度者度脫生死苦海淨名經云一切衆生本性常滅不復更滅六祖慧能壇經云自性自度名為真度文殊菩薩問世尊實無衆生得滅度者如何世尊曰性本清淨無生無滅故無衆生得滅度無涅槃可到此皆歸之衆生而佛不以為功也相形迹也六祖曰修行人亦有四相心有所能輕慢衆生名我相自恃持戒輕破戒者名人相厭三途苦願生諸天是衆生相心愛長年而勤修福業法執不忘是壽者相有四相即是衆生無四相即是佛復次須菩提菩薩於法至菩薩但應如所教住復次謂再偏次佛與須菩提答問之言也此段說住心也然說住而降即在其中無所住者心不執著須菩提問住心佛教以不住為住也布施謂以滅度衆生之法布施也眼耳鼻舌身意為六根色聲香味觸法為六塵觸字包得廣凡身所應接皆是法猶諺云方法凡意所計畫皆是福者德之施德者福之本凡夫六根不淨貪是六塵以快其欲一不如其欲則必布施以求滿其欲有所住而布施者然也菩薩受知如來無相教法無諸欲之求無能施之心但以法施利益衆生如水行地中無有礙無所住行布施者然也不也世尊須菩提既答而復呼之尊而親之之意後倣此謝靈運曰聖言無謬理不可越但當如佛所教而安心耳按如所教住即楞伽經所云以不住法名住也以上三段全經大旨已括後乃細論條目層層推究其蘊也須菩提於意云何至所說身相即非身相身相即色身得見如來謂得見法身佛告須菩提凡有所相至若見諸相非相即見如來凡有所相皆是虗妄四句經中最要語即名四句偈即下文所稱章句以上二段須菩提領悟身相非相而佛即推擴告之也即見如來謂即見自心之如來所謂雲霧揆而青天見欲念淨而天理存也須菩提白佛言世尊至法尚應捨何況非法此段乃佛獎勸學者婆心處即護念也通經皆護念此其顯云智度論云佛法大海信為能入蓋實信者實諦之階也淨不雜也僧若訥曰法相者有見也非法相者無見也捨二邊之著故云無也心之所之即謂取取則成著以是義故者即不住相之義也如筏喻者筏編竹以渡水者喻人藉佛法可以到彼岸也傅大士曰渡河須用筏到岸不須船此言盡之矣須菩提於意何至皆以無為法而有差別謝曰非法則不有非非法則不無有無並無理之極也按此即印無法相亦無非法相之言也賢者菩薩阿羅漢聲聞緣覺衆皆是聖即佛也無為法者順真性之自然無所作為也須菩提知得無為法真是悟道深處譬如為善欲以得福不為惡恐其獲禍皆有為也惟以理當為善不應為惡縱善而獲禍在所必為惡而幸福在所不為直堅心以行之而已有差別者賢則無諍三昧聖則如如不動也須菩提於意云何至是故如來說福德多以上二段是須菩提便悟處釋典以此世界之外更有無數世界統曰大千世界心地觀經注曰如一須彌一日月星辰一四大洲一六欲上有初禪天覆之但言小世界不得言千如是一千小世界上覆二禪為小千世界如是一千小世界上覆三禪為一中千世界如是一千中千世界上覆四禪為一大千世界楞嚴經曰世為遷流界為方位十方為界過去未來現在為世此布施為財施七寶者金銀琉璃珊瑚瑪硓珍珠玻璃也福德者事福也福德性者理福也謝曰福德非性所以因緣增多多則易著故即遣之若復有人於此經中受持至所謂佛法者即非佛法此一段佛言也偈釋氏詩詞也所謂佛法非法隨說隨掃一部經如是須菩提於意云何至須菩提是樂阿蘭那行此段乃入道次第而須菩提即以自證也須陀洹華言入流謂已入聖賢之流果者譬猶木之有實孫氏彚纂云此聲聞初果自聲教而悟者曰聲聞能逆凡流故入聖流但未盡六根虗習故僅為初果斯陀含華言一往來謂一往天上一來人間便得涅槃實無往來者無往來之念也孫氏云此聲聞第二果比入流又高一層阿那含華言不來已斷欲界思惑盡直生四禪天上不來欲界受生故曰不來實無不來者亦是無不來之念孫氏云本性清淨光明真空無我不見可欲本無欲界故實無不來也此聲聞第三果比尚有往來又高一級阿羅漢華言無生人法俱空已證涅槃聲聞之道至此圓滿已極故不名果而名道謝云阿羅漢者無生也相滅生盡謂之無生若有計念則見我人起相也黃成釆云實無有法塵心淨盡無法可學也孫氏云此果斷三界見思煩惱俱盡又曰四果人俱無得果之心可見聖賢皆以無為法全不住相矣但四果只是了一身不度衆生佛門謂之小乘諍者爭也塵念欲行道念欲遣如水火不相合兩念相爭也無諍則理欲俱忘一念不起心無生滅去來惟有本覺常明故名無諍三昧三昧華言正定六祖曰三昧梵音正受亦云正見遠離九十五種邪見是名正見阿蘭那華言寂靜阿蘭那行者即是清淨行徐士英曰佛所說四果自有等級第一云不入色聲香味觸法則是知欲當避此果之初生第二云一往來則是蹈欲境不再此果之方碩第三云不來則是去欲境如遺此果之已熟第四云離欲則是脫然無纖欲可除此果之既收以此觀之亦是下學上達處佛告須菩提於意云何至即非莊嚴是名莊嚴然燈佛是世尊授記之師生時有光於眼耳口鼻有孔中放出如燈之明故號然燈明心見性乃是有法而非法得無所得故曰於法實無所得也莊嚴佛土是從境說答亦從境說談境正所以徵心六祖云本來無一物何處惹塵埃是故須菩提諸菩薩摩訶薩至應無所住而生其心以上二段云云千經萬典大指會歸於此蓋有所住而生心便是墮外道無所住而不生心便是斷滅稍有錯誤毫𨤲千里迷則佛衆生悟則衆生佛也五祖宏忍為六祖說金剛經至應無所住而生其心六祖言下大悟乃言何期自性本自清淨何期自性本不生滅何期自性本自具足何期自性本無搖動五祖曰不識本心學法無益若言下識自本心見自本性即名夫丈天人以上二段言法本於心非有所得莊嚴在心不於佛土然則諸菩薩惟當明此心而已應無所住而生其心一句是世尊傳授心法點睛處須菩提譬如有人至佛說非身是名大身須彌華言高妙此山在四天下之中高廣三百三十六萬里日月繞山而行以為晝夜由此分四面為四天下其上有三十三天為山之至大者故稱山王非身者法身也真心也一切有形相當無不壞惟真性無形相故無得而壞須菩提如恆河中所有沙數至而此福德勝前福德恆河西天竺之河從阿耨地東流出周回四十里沙細如麵佛多在此處說法故取以為喻僧肇曰良由施福是染沉溺三有持經福淨超升彼岸是故勝也以上二段言非身喻大身無為福勝有為福也復次須菩提隨說是經至即為有佛若尊重弟子天者十八天人之類人者概僧俗而言阿修羅即卵胎化濕諸生謝云封殯法身謂之塔樹像虗空謝之廟聖體神儀全在四句獻供致敬宜盡厥心也六祖曰所在之處見人即說是經常行無所得心即此身中有如來全身舍利故言如佛塔廟心清淨而說是經令諸聽者除迷妄心悟得本來佛性常行真實感得天人阿修羅人非人等皆來供養持經之人也又曰自心誦得此經自心解得經義自心體得無著無相之理所在之處常修佛行即自心是佛故言所在之處即為有佛僧若訥曰經者即法寶也即為有佛即佛寶也若尊重弟子即僧寶也經典所在之處即三寶共居也此段歸重經典領起下文爾時須菩提白佛言世尊至是名般若波羅蜜至此說明經名顏柄曰妙明本性湛若大虗體既尚無何名之有如來恐人生斷滅見不得已而強安是名也所以傅大士頌云恐人生斷滅權且立虗名須菩提於意云何至非世界是名世界謂佛有說法則可謂佛有所說則不可玩所字便有造作的意思陳雄曰世尊答文文殊曰在世離世在塵離塵是為究竟法此言非微塵非世界即離塵離世也須菩提於意云何至即是非相是名三十二相王日休曰以上二段云云三十二相者般若經曰如來足下有平滿相一足下千福輪文無不圓滿二手足並皆柔軟如兜羅綿三兩足一二指間猶如雁王文同綺畫四手足諸指圓滿纖長可愛五足跟廣長圓滿與趺相稱六足趺修高光滿與足跟相稱七雙腨漸須纖如鹿王腨八雙臂平立摩膝如象王鼻九陰相藏密十毛孔各一毛生紺青宛轉十一髮毛右旋宛轉十二身皮細薄潤滑垢水不住十三身皮金色晃耀諸寶莊嚴十四兩足兩掌中頸雙肩七處充滿十五肩項圓滿殊妙十六膊腋悉皆充實十七容儀洪滿端直十八身相修廣端嚴十九依相量等園滿二十額臆并身上半威容廣大如獅子王二十一常見面各一尋二十二齒相四十齊平淨密根深白逾珂雪二十三四牙鮮白鋒利二十四常得味中上味二十五舌相薄淨廣長能覆面輪至耳髮際二十六梵奇詞韻和雅隨衆多少無不等聞二十七眼睫猶若牛王紺青齊整二十八眼睛紺青鮮白紅環二十九面輪其猶滿月眉相皎淨如天帝弓三十眉間有白毫相柔軟如綿白逾珂雪三十一頂上有烏瑟膩沙高顯周圍猶如天蓋三十二王日休曰以上二段大意謂細而微塵大而世界妙而佛之色身皆為虗妄但有名而已惟真性為真實是以自古及今無變無壞彼三者則有壞故也按所云三十二相似屬復踏但無可考今姑存之須菩提若有善男子至離一切相即名諸佛此段乃須菩提深讚佛法以勉人處涕淚非泣者以如是甚深經典痛聞之不早也陳曰性中具如來法身夫是之謂生實相經以福兼德言者屢矣而此獨言功德是功成果滿之時則其福為不足道所以壇經有功德在法身中非在相福之句前佛云若見諸相非相即見如來此云離一切相即名諸佛是須菩提與佛印證處佛告須菩提如是如是至是名忍辱波羅蜜此段佛隨舉布施及忍辱波羅蜜以示人僧肇曰得大乘聞慧解一往聞經身無懼相故名不驚得大乘思慧解深信不疑故名不怖得大乘修慧解順教修行終不有謗故名不畏疏鈔云何以故者顯因中最勝明標第一波羅蜜者有十種一布施二持戒三忍辱四精進五禪定六智慧七慈八悲九方便十不退今言第一波羅蜜者即布施波羅蜜何故獨言布施第一曰布施者通攝萬行直至菩提尚行布施因布施資生衆善言非者恐有能所之名先拂去能名行無住相施者故曰是名第一波羅蜜者也何以故須菩提如我昔為至無衆生相無壽者相此段佛以現身說法證忍辱波羅蜜也歌利華言極惡如來昔因中證初地已山居修道王帶宮女出獵倦而寢諸女人入山禮仙王覺而怒入山尋之問仙得果否答曰未得又問以何為戒答曰以忍為戒王割其耳容顏不變又劓其鼻截其手其臣爭諫不聽四天王雨沙石王布畏懺悔仙復身如故王乃歸信受記或曰爾時王者即憍陳如也是故須菩提菩薩應離至一切衆生即非衆生謝曰不住色無財物也按之六祖曰菩薩不為來望自身五欲快樂而行布施但為內破慳心外利益衆生而行布施又曰如來說我人等相畢竟可破壞非真實體也一切衆生盡是假名若離妄心即無衆生可得故言即非衆生按若心有住即為非住者謂心有所住即非如來之以不住為住也須菩提如來是真語者至此法無實無虗謝曰真不僞實無虗如必當理不誑則非妄語不異則始終恆一聖言不謬故直修行也六祖曰無實者以法體空寂無相可得然中有恆河性德用之不匱故言無虗按前既說於法實無所得此何以又言如來所得法以無實無虗故即為之所得法須菩提若菩薩心住於法至日光明照見種種色利令智昏公能生明以上三段皆反覆譬喻以明不住心法也住法布施者如我立規條以強人從我則彼此相蒙人之心昧而我之心亦蔽而無所見不住法布施者如只示人以自明其心自見其性則人己兩忘同登彼岸何等光明普照也須菩提當來之世至受持讀誦為人解說初日中日後日猶言一日早中晚也劫華言世也經中每於段尾屢云較量福德者皆佛獲念付囑菩薩之深心處須菩提以要言之至以諸華香而散其處云為發最上乘者說即中人以上可以語上也云若樂小法者云云即中人以下不可語上也此段是明善聲乘緣覺乘菩薩乘為三乘大乘謂菩薩乘也最上來謂佛乘也聲獨了生死不度衆生名小乘如車乘之小者止能自載也緣覺半為人半為己所度無多名中乘菩薩能度一切衆生名大乘佛能兼衆生菩薩而皆度之為最上乘謝曰千載不墜由於人宏任持運行荷擔義也按此之謂付囑通經旨付囑此其重云復次須菩提若善男子善女人至果報亦不可思議此段是滅惡訥曰造作定業不可逃以行般若故易重為輕地獄云云陳曰世人喜於為惡嫉于為善者多矣一見是人為人輕賤便謂讀經無益福報為虗語甚至謗佛罵佛者使人人起退轉心佛之言此所以長善而救失云地獄餓鬼畜生三惡道也即三途苦阿僧祇華言無央數那由他華言一萬萬按凡佛所言滅度輪回果報等皆以濟末世德禮政刑之窮使人心有所攝以人之畏人不如其畏神故藉此以設教豈可思議乎哉
