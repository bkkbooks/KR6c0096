body:
  text: 爾時須菩提白佛言至阿耨多羅三藐三菩提心者此段申明前文而以無有法結云蓋須菩提敘述前此問答之詞有請益之意所以者何以下佛答也實無有法發阿耨多羅三藐三菩提心者者字自明自性告人亦自明自性何法之有乃實指菩薩示之菩薩應除能所心也須菩提於意云何至即非一切法是故名一切法此段佛又現身説法以無上正等正覺證實有得阿耨多羅三藐三菩提也如來佛自謂也正義云梵語釋迦此云能仁梵語牟尼此云寂默寂默為體即是如能仁為用即是來先釋迦而後牟尼者攝用以歸體也先如而後來者從體以起用也總是一個真性如號則為釋迦牟尼通稱則為如來又為佛諸法如義應前以是義故之義皆是佛法即無虗不滅相也即非一切法即無實不著相也須菩提譬如人身長大至如來説名真是菩薩此段又申覆前文而以無我法結之佛復述前譬之人身長大須菩提既知非大身是名大身是悟非大身者即真心也即此無四相之心也故以菩薩亦如是告之焉按前佛言我應滅度衆生云云此云若作是言我當滅度無量衆生即不名菩薩何也蓋此為菩薩未到佛地住者言之未到佛地住而作是言即不名菩薩佛欲菩薩先去四相為要故緊接以佛説一切法無四相而以通達無我法結之此無我兼人衆壽者言一説莫作是言欲菩薩去能所心也亦通須菩提於意云何至如是世尊如來有佛眼華嚴經云肉眼見一切色故天眼見一切衆生心故慧眼見一切衆生諸般境界故法眼見一切法如實相故佛眼見如來十力故大般若經所謂清淨五眼是也須菩提於意云何至未來心不可得此段重明不住心而語益加切矣王曰佛世界者謂凡一大世界必有一佛設化故凡大世界皆謂之佛世界若干種心如來悉知以五眼知之也六祖曰爾所國土中所有衆生一一衆生皆有若干差別心數雖多總名妄心識得妄心非心是名為心顏云思念前事為過去思念今事為現在思念後事為未來三念總放下著謂之不可得王曰不可得者謂無也言此三心本來無有乃因事而有耳圓覺經所以言六塵緣影為自心相者謂衆生以六種塵緣之影為自己之心相也過去現在未來讀斷下心不可得四字連誦成句須菩提於意云何至如來説得福德多因緣者由因而緣因布施緣及福德也福德有實者布施有用之福德福德無者即福德性此多字與第八分多字異彼以多為不足道此則真為多矣張國維曰此不是無福德乃是福德無無福德則為斷滅福德無乃是湛然清淨即所謂福德性也疏鈔云若據捨大千珍寶布施其福極多若執著希望福德有得則有盡故云若福德執實有如來不説得福德多此是反釋之義言以福德無者希望心也既無希望即為無住相施是名無為福若依無住無為而施者故如來説得福德多訥曰福有者取相也福無者離相也離相故稱性等虗空其福無量須菩提於意云何至無法可説是名説法此段亦覆前文而以無法可説結之具足無欠缺也具足諸相則不止三十二相凡種種變現神通之相皆是即非者不執有是名者不執無通經皆然王曰説法者實無有法謂本來無法特為衆生除外妄而説耳衆生既悟則不用此法耳故但虗名為説法而已爾時慧命須菩提白佛言至説非衆生是名衆生此段佛若輕視視衆生可見慈悲心無時無處不有也疏鈔云言慧命者善現達佛智海入深法門悟慧無生覺本源之命非去非來故曰慧命須菩提佛言彼非衆生者皆具真一之性與佛同源故曰非衆生言非不衆生者背真逐妄自喪己靈故曰非不是衆生爾時慧命須菩提六十二字秦譯無惟魏譯有唐穆宗時長安僧靈幽入冥誦經少此一段冥王歎曰貫花之線何斷而不續乎增壽十年令往濠州鐘離寺求石全文補入須菩提白佛言世尊至是名阿耨多羅三藐三菩提此段須菩提以如來説非衆生可見各有自性佛之得阿耨多羅三藐三菩提為得之自性而非得之自外也是信詞非疑詞顏曰有法可得是名法縛無法可得方名解脫須菩提以無可得之辭而告世尊世尊即以如是如是而證據之佛又云我於無上正等正覺乃至無少法可得虗名而已王曰無小法可得則蕩然空空是不可此形相求不可以言説求也但説名為無上正等正覺而見復次須菩提是法平等至即非善法是名善法言上自諸佛下至蠢動含靈其真性一同故云平等無有高下即此名為無上正等正覺也但衆生雖同具此無上正等正覺之性因迷於四相妄緣而失之耳若能以無四相而修一切善法即得無上正等正覺也佛又呼須菩提而謂所言善法者即非善法謂本來無此善法乃假此以開悟衆生耳故但虗名為善法而已此段是佛至此明示學者受持之方最喫緊處全在以修兩字著力須菩提若三千大千世界中至算數譬喻所不能及五祖曰自性若迷福何可救六祖曰乘船永世求珠不知身是七寶二佛之言皆為世人不修身修性徒施寶以求福道須菩提於意云何至即非凡夫是名凡夫此段重戒人不當存有我私見也呼汝等者為提醒會下諸大衆也僧訥曰如來雖設法施廣度衆生而不作是念故誡云汝等勿謂也莫作是念重誡也度無度相能所一空又曰如來既無我人衆生等相何有時稱我須知假名稱我對所度衆生隨世説我顏云當人自性自度迷來悟度邪來正度從上諸佛所言但有指出路頭須是自行自履豈由他人所以道實無有衆生如來度者若有可度是如來有四相如來乃見性人也所以無我凡夫未見性人也所以我相未忘佛又恐人落分別界故曰即非凡夫所以見如來凡夫本同一性不容分別須菩提於意云何至是人行邪道不能見如來此段佛云云上見就如來説又云不應以具足色身具足諸相見此觀就學者説轉輪聖王即四天王正五九月照南閻浮提二六十月照西瞿耶尼三七十一月照北單越四八十二月照東弗婆提如輪之轉管四天下察人間善惡者以業報福德亦具三十二相六祖曰轉輪聖王雖有三十二相豈得同如來世尊引此言者以遣執相之病須菩提是大阿羅漢所悟甚深得方便門不生迷路以冀世尊除遣細惑令後世衆生所見不謬也此段是佛與須菩提恐會下大衆未能了悟非相之説故再細辨前論而結以偈言以釋衆惑也不然須菩提前已知不應以三十二相見如來此何以又言色相如是也疏鈔曰如來法身者非色非聲無相無形不可以心思不不可以識識在凡不少至聖不增看時不見悟則全彰須菩提汝若作是念至於法不説斷滅相此段戒人不可存斷滅見也王曰諸法斷滅者謂一切法皆斷之滅之而不用也相謂凡法之相也法固不可以泥然亦豈可以斷滅之哉譬如渡水既渡之後固不須舟楫未渡之前豈可無舟楫耶所以發求無上正等正覺真性之心必須依佛法修行不可遂斷滅佛法而謂不用法也顏曰此一卷經雖然説無之一字佛又恐人執著此無一面沉空滯寂棄有著無反成斷滅相故此一分專戒人不可斷滅未見惟人如何便説一切皆無所以佛告須菩提汝莫作是念如來不以具足相故得阿耨多羅三藐三菩提法若果作是念發心即是諸法斷滅相何以故凡發無上正等正覺心不可説斷滅相又云昔張秀才拙參西堂禪師問山河大地三世諸佛是有是無師答云有張云錯師云爾曾參見什麼人來張云參見徑山禪師來某甲問徑山皆言無師云俟爾得似徑山時一切皆無即得大凡須菩提若菩薩以滿恆河沙等至是故説不受福德知一切法二句即宏毅以任重而道遠也不受福德即施德不望報意此段承上文言既不斷滅而於一切法皆當成於堅忍以無我念而不應貪著福德也六祖曰通達一切法無能所心是名為忍此人所得福德勝前七寶之福王曰若為作福德而度衆生則是貪著其福德而欲亭受也前以較量福德屬衆生説此以較量布施福德屬菩薩説亦以見是法平等也須菩提若有人言至亦無所去故名如來此段云云疏鈔云如來者來而不來去而不去住而不住非動非靜上合諸佛下等羣生一性平等故號如來至此段明如來真性法身須菩提若善男子善女人至但凡夫之人貪著其事此段又重戒貪著也世界者微塵之合也微塵者世界之散也舉世界微塵而萬事萬物皆然顧欲合而不散則貪著矣六祖曰一合相者如眼見色愛色即與色合耳聞聲愛聲即與聲合至於六塵若散即是真世界合即凡夫散即非凡夫凡夫之人於一切法皆合相若菩薩於一切法皆不合而散何以故合即繫縛起生滅散即解脫亦不生不滅若有繫縛生滅者即是凡夫所以經云但凡夫之人貪著其事須菩提若人言佛説我見至即非法相是名法相黃蘗師曰前説四相此説四見相粗而見精因有四見故形四相也又云佛以見性為見人以見相為見如是即指無四見言顏曰如是二字説來若發無上正等正覺心者於一切法應當如此知如此見如此信解不必外求法相然初入道時不假法相故無入頭處既見性了亦當遠離不要執著所謂得魚忘却筌到岸不須船之説此段言人若悟了并此四見之名亦當無有故於一切法應如是知見信解也須菩提若有人以滿無量至應作如是觀凡佛所言四句偈等者謂不必專於偈凡可以演説者皆是況其為言之要者乎顏曰如如不動湛然太虗何以故蓋世間一切有為之法如夢寐之非真如燈幻之眩惑如水泡之暫時如人影之易滅如朝露之易消如閃電之倐忽應作如是觀者應立如此見性之法陳曰佛所謂一切法者真實無相法也故一切賢聖皆以無為法曰有為法則夢幻泡影露電之如不其妄乎惟了真空無相者能作是觀以悟亦如之妄則必離亦如以證如如不動之理昔優婆離尊者語阿難曰諸有為法並是無常想夫觀六如而得是句張國維云佛法有空假中三觀末段仍歸於無為而以偈語收結至此則無聲無臭至矣佛説是經已長老須菩提至皆大歡喜信受奉行優婆塞華言覲事男優婆夷華言覲事女覲事者謂在家全受五戒恆以親供養三寶而為其事也復題金剛經闡説後序陳子滋甫豫至契友也常語豫曰昔先祖存吾公知常州府事公餘之暇著作甚富必有可觀惜與先生南北睽違不能共閲手澤為憾豫曰令先祖之著作也袖歸自八千里外珍藏至五十年餘其間有關名教可傳後人者自當亟付剞劂以公於世方不失為繼述之盛事奚止為觀閲鑒賞計哉洛甫應之曰唯唯逮至同治壬戌彩屬擾亂洛甫家被困閲兩三月一旦圍解轉危為安人言伊家有巨人手自室中出大如車輪羣懼而散後洛甫遍覽室中並無他物惟架上有祖遺一書箱耳啓閲皆在署手犒散帙飄颻纂成者惟金剛經闡説一編方悟此手其印金剛手歟是編亦洛甫平日所虔誦也不期已被蠧魚竊去數十字矣於是滋甫感豫前言膳寫就質於豫屬豫補之豫曰前言戲之耳今竟有是事耶但是事固吾黨所不語故豫不敢敘之於前而特書之於後者乃不自揣固陋也今熟讀其文細玩其説竊取其意以補之方知存吾先生之用心苦而遺澤長故其闡是經也不過緣經以聞義因義以著説而旨意了徹人易覺悟大有儒宗之風其不同於高談元妙也明矣豫故樂倡而共襄之庶不員闡説之婆心亦足徵善人之有後也故謂之功德不可思議也可即謂之果報不可思議也亦無不可同治丁卯夏月臺陽洪壽椿載撰
